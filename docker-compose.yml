services:
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10", "-c", "max_wal_senders=10"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_wms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_wms"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:8.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-mongo_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change-this-mongodb-root-password}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE:-smart_wms_documents}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-smart_wms}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-change-this-mongodb-app-password}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
      - ./mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
          echo "waiting for kafka"
          sleep 3
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ods_order_status_change_raw --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic dwd_order_status_change --partitions 1 --replication-factor 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_CLUSTERS_0_NAME: smart-wms
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8083}:8080"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-smart_wms_dw}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'select 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  flink-jobmanager:
    build: ./flink
    command: jobmanager
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${FLINK_WEB_PORT:-8082}:8081"
    environment:
      CLICKHOUSE_JDBC_URL: jdbc:clickhouse://clickhouse:8123/${CLICKHOUSE_DB:-smart_wms_dw}
      CLICKHOUSE_USER: ${FLINK_CLICKHOUSE_USER:-wms_dw}
      CLICKHOUSE_PASSWORD: ${FLINK_CLICKHOUSE_PASSWORD:-}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 1
    volumes:
      - ./flink/sql:/opt/flink/usrlib/sql:ro

  flink-taskmanager:
    build: ./flink
    command: taskmanager
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_started
    environment:
      CLICKHOUSE_JDBC_URL: jdbc:clickhouse://clickhouse:8123/${CLICKHOUSE_DB:-smart_wms_dw}
      CLICKHOUSE_USER: ${FLINK_CLICKHOUSE_USER:-wms_dw}
      CLICKHOUSE_PASSWORD: ${FLINK_CLICKHOUSE_PASSWORD:-}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smart_wms}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smart_wms}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: ${MONGO_APP_DATABASE:-smart_wms_documents}
      SPRING_DATA_MONGODB_USERNAME: ${MONGO_APP_USERNAME:-smart_wms}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGO_APP_PASSWORD:-change-this-mongodb-app-password}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: ${MONGO_APP_DATABASE:-smart_wms_documents}
      DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      AI_ENDPOINT: ${AI_ENDPOINT:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_SERVICE_URL: http://ai-service:8090
      AI_INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN:-change-me}
      WAREHOUSE_REALTIME_CLICKHOUSE_URL: http://clickhouse:8123
      WAREHOUSE_REALTIME_CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB:-smart_wms_dw}
      WAREHOUSE_REALTIME_CLICKHOUSE_USER: ${WAREHOUSE_REALTIME_CLICKHOUSE_USER:-wms_dw}
      WAREHOUSE_REALTIME_CLICKHOUSE_PASSWORD: ${WAREHOUSE_REALTIME_CLICKHOUSE_PASSWORD:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
    ports:
      - "8080:8080"

  ai-service:
    build: ./ai-service
    environment:
      BACKEND_URL: http://backend:8080
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-5}
      AI_INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN:-change-me}
      WMS_DB_DSN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-smart_wms}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "8090"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  postgres-data:
  mongodb-data:
  kafka-data:
  clickhouse-data:
