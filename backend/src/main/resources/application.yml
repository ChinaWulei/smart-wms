server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_wms}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    properties:
      jakarta:
        persistence:
          jdbc:
            url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_wms}
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai

ai:
  endpoint: ${AI_ENDPOINT:}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-4o-mini}
  service-url: ${AI_SERVICE_URL:http://localhost:8090}
  internal-token: ${AI_INTERNAL_TOKEN:change-me}
  pdf-font: ${AI_PDF_FONT:/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc,0}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:ap-southeast-1}
