server:
  port: ${SERVER_PORT:8080}

spring:
  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_APP_DATABASE:smart_wms_documents}
      username: ${MONGO_APP_USERNAME:smart_wms}
      password: ${MONGO_APP_PASSWORD:change-this-mongodb-app-password}
      authentication-database: ${MONGO_APP_DATABASE:smart_wms_documents}
      auto-index-creation: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_wms}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
  mvc:
    async:
      request-timeout: 180000

ai:
  endpoint: ${AI_ENDPOINT:}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-4o-mini}
  service-url: ${AI_SERVICE_URL:http://localhost:8090}
  internal-token: ${AI_INTERNAL_TOKEN:change-me}
  pdf-font: ${AI_PDF_FONT:/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc,0}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:ap-southeast-1}
